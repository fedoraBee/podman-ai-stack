name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-rpm:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: dnf install -y make rpm-build createrepo_c gnupg2 rpm-sign

      - name: Build RPM
        run: make rpm

      - name: Import GPG Key
        if: env.GPG_PRIVATE_KEY != ''
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --import
          echo "GPG_KEY_ID=$(gpg --list-keys --with-colons | grep '^pub' | head -n 1 | cut -d: -f5)" >> $GITHUB_ENV

      - name: Sign RPM
        if: env.GPG_KEY_ID != ''
        run: make sign GPG_KEY_ID=${{ env.GPG_KEY_ID }}

      - name: Update Repository
        run: make repo GPG_KEY_ID=${{ env.GPG_KEY_ID }}

      - name: Deploy to GitHub Pages
        if: startsWith(github.ref, 'refs/tags/')
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./
          
      - name: Upload Repository Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dnf-repo
          path: rpmbuild/RPMS/noarch/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            rpmbuild/RPMS/noarch/*.rpm
            rpmbuild/RPMS/noarch/repodata/*
