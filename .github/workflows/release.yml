name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-rpm:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: dnf install -y make rpm-build createrepo_c gnupg2 rpm-sign git

      - name: Build RPM
        run: make rpm

      - name: Import GPG Key
        if: ${{ secrets.GPG_PRIVATE_KEY != '' }}
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --import --batch
          KEY_ID=$(gpg --list-keys --with-colons | grep '^pub' | head -n 1 | cut -d: -f5)
          echo "GPG_KEY_ID=$KEY_ID" >> $GITHUB_ENV
          echo "Imported GPG Key: $KEY_ID"

      - name: Sign RPM
        if: env.GPG_KEY_ID != ''
        run: make sign GPG_KEY_ID=${{ env.GPG_KEY_ID }}

      - name: Update Repository
        run: |
          CHANNEL=stable
          if [[ "${{ github.ref_name }}" == *"rc"* ]] || [[ "${{ github.ref_name }}" == *"beta"* ]] || [[ "${{ github.ref_name }}" == *"alpha"* ]] || [[ "${{ github.ref_name }}" == *"test"* ]]; then
            CHANNEL=testing
          fi
          echo "Deploying to channel: $CHANNEL"
          make repo GPG_KEY_ID=${{ env.GPG_KEY_ID }} CHANNEL=$CHANNEL
      
      - name: Prepare git environment
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git config --global --add safe.directory '*'
      
      - name: Debug repo contents
        run: ls -R rpmbuild/repo
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: rpmbuild/repo
          
      - name: Upload Repository Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dnf-repo
          path: rpmbuild/repo/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            rpmbuild/RPMS/noarch/*.rpm
