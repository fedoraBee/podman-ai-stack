name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
jobs:
  build-rpm:
    runs-on: ubuntu-latest
    environment: gh-pages
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: dnf install -y make rpm-build createrepo_c gnupg2 rpm-sign git rsync

      - name: Build RPM
        run: make rpm

      - name: Import GPG Key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Configure GPG for CI
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "use-agent" > ~/.gnupg/gpg.conf
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
          chmod 600 ~/.gnupg/*
          gpgconf --kill gpg-agent
          
      - name: Debug gpg
        run: |
          gpg --version
          which gpg
          rpm --eval '%{__gpg}'

      - name: Configure RPM signing
        run: |
          echo "%_signature gpg" > ~/.rpmmacros
          echo "%_gpg_name ${{ vars.GPG_KEY_ID }}" >> ~/.rpmmacros
          echo "%__gpg_sign_cmd %{__gpg} --batch --yes --pinentry-mode loopback --passphrase \"$GPG_PASSPHRASE\" -u \"%{_gpg_name}\" -sbo %{__signature_filename} %{__plaintext_filename}" >> ~/.rpmmacros
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Sign RPM
        run: make sign GPG_KEY_ID=${{ vars.GPG_KEY_ID }}

      - name: Update Repository
        run: |
          CHANNEL=stable
          if [[ "${{ github.ref_name }}" == *"rc"* ]] || [[ "${{ github.ref_name }}" == *"beta"* ]] || [[ "${{ github.ref_name }}" == *"alpha"* ]] || [[ "${{ github.ref_name }}" == *"test"* ]]; then
            CHANNEL=testing
          fi
          echo "Deploying to channel: $CHANNEL"
          make repo GPG_KEY_ID=${{ vars.GPG_KEY_ID }} CHANNEL=$CHANNEL
      
      - name: Prepare git environment
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git config --global --add safe.directory '*'
      
      - name: Debug repo contents
        run: ls -R rpmbuild/repo
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: rpmbuild/repo
          
      - name: Upload Repository Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dnf-repo
          path: rpmbuild/repo/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            rpmbuild/RPMS/noarch/*.rpm
